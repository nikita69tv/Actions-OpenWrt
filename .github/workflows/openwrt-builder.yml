name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Switch SSH mode'
        required: false
        default: 'false'

env:
  # Используем последнюю ванильную версию OpenWrt
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.5
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Europe/Moscow

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: xiaomi_redmi-router-ax6s
            target: mediatek
            subtarget: mt7622
            friendly_name: AX3200
            packages: "luci luci-i18n-base-ru luci-i18n-firewall-ru luci-i18n-package-manager-ru dnsmasq-full wpad-openssl luci-ssl sing-box curl jq ca-bundle nano openssh-sftp-server luci-app-sqm luci-i18n-sqm-ru sqm-scripts tc-tiny luci-app-watchcat podkop-plus luci-app-podkop-plus luci-i18n-podkop-plus-ru"
          
          - device: xiaomi_mi-router-ax3000t
            target: mediatek
            subtarget: filogic
            friendly_name: AX3000T
            packages: "luci luci-i18n-base-ru luci-i18n-firewall-ru luci-i18n-package-manager-ru dnsmasq-full wpad-openssl luci-ssl sing-box curl jq ca-bundle nano openssh-sftp-server tc-tiny luci-app-watchcat luci-i18n-watchcat-ru watchcat podkop-plus luci-app-podkop-plus luci-i18n-podkop-plus-ru"

          - device: cudy_wr3000p_v1
            target: mediatek
            subtarget: filogic
            friendly_name: WR3000P
            packages: "luci luci-i18n-base-ru luci-i18n-firewall-ru luci-i18n-package-manager-ru dnsmasq-full wpad-openssl luci-ssl sing-box curl jq ca-bundle nano openssh-sftp-server tc-tiny luci-app-watchcat luci-i18n-watchcat-ru watchcat podkop-plus luci-app-podkop-plus luci-i18n-podkop-plus-ru"

    name: Build ${{ matrix.friendly_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depends_static_ubuntu_2204)
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$USER /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          cd openwrt
          if [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ]; then
            cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          else
            touch .config
          fi
          
          # Очистка и установка цели
          sed -i 's/CONFIG_TARGET_mediatek=y/# CONFIG_TARGET_mediatek is not set/' .config
          echo "CONFIG_TARGET_${{ matrix.target }}=y" >> .config
          echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y" >> .config
          echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}_DEVICE_${{ matrix.device }}=y" >> .config
          
          # Удаление стандартных пакетов
          echo "CONFIG_PACKAGE_dnsmasq=n" >> .config
          echo "CONFIG_PACKAGE_wpad-basic-mbedtls=n" >> .config
          
          # 1. Первый прогон defconfig для применения базовой архитектуры
          make defconfig
          
          # 2. Добавление пакетов из матрицы
          for pkg in ${{ matrix.packages }}; do
            echo "CONFIG_PACKAGE_$pkg=y" >> .config
          done
          
          # Жестко указываем язык
          echo "CONFIG_LUCI_LANG_ru=y" >> .config
          
          # 3. Второй прогон defconfig, чтобы он подтянул зависимости для новых пакетов
          make defconfig
          
          # 4. ФИНАЛЬНЫЙ УДАР: принудительно возвращаем всем пакетам статус встраиваемых (=y), 
          # если defconfig попытался сбросить их в модули (=m)
          for pkg in ${{ matrix.packages }}; do
            sed -i "s/CONFIG_PACKAGE_$pkg=m/CONFIG_PACKAGE_$pkg=y/g" .config
          done
          sed -i "s/CONFIG_LUCI_LANG_ru=m/CONFIG_LUCI_LANG_ru=y/g" .config
          
          # Подмена Sing-box (скрипт создаст папку files внутри openwrt)
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH
          
      - name: Download & Compile
        run: |
          cd openwrt
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Firmware_${{ matrix.friendly_name }}
          path: openwrt/bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}

      - name: Generate release tag
        id: tag
        run: |
          # Используем дату и уникальный номер текущего запуска Actions
          echo "release_tag=$(date +"%Y.%m.%d")-run${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Prepare files for Release
        run: |
          cd openwrt/bin/targets/${{ matrix.target }}/${{ matrix.subtarget }}
          # Переименовываем все файлы, добавляя префикс модели (например, AX3200_...)
          for file in *; do
            if [ -f "$file" ]; then
              mv "$file" "${{ matrix.friendly_name }}_$file"
            fi
          done
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success' && !cancelled()
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: ${{ env.FIRMWARE_PATH }}/*
          body: |
            Обновление прошивок OpenWrt (ванильная ветка main).
            Устройства: AX3200 (AX6S), AX3000T и Cudy WR3000P v1.
            Sing-box: Extended.
            Podkop: Plus 0.7.19.9.
